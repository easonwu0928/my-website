<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA 即時賽事結果預測器</title>
    <link rel="icon" href="favicon.ico.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🏀 NBA 賽事深度分析</h1>
        
        <div class="card">
            <div class="section-title">比賽現況輸入</div>
            <div class="input-group">
                <label>主隊目前得分：</label>
                <input type="number" id="homeScore" placeholder="0">
            </div>
            <div class="input-group">
                <label>客隊目前得分：</label>
                <input type="number" id="awayScore" placeholder="0">
            </div>
            <div class="input-row">
                <div class="input-group">
                    <label>目前節數：</label>
                    <select id="quarter">
                        <option value="1">第一節</option>
                        <option value="2">第二節</option>
                        <option value="3">第三節</option>
                        <option value="4">第四節</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>剩餘時間：</label>
                    <div style="display: flex; gap: 5px; align-items: center;">
                        <input type="number" id="minLeft" placeholder="分" min="0" max="12">
                        <span>:</span>
                        <input type="number" id="secLeft" placeholder="秒" min="0" max="59">
                    </div>
                </div>
            </div>

            <hr>
            <div class="section-title">運彩盤口分數 (選填)</div>
            <div class="input-row">
                <div class="input-group">
                    <label>中場盤口：</label>
                    <input type="number" id="lineHalf" step="0.5" placeholder="例如: 110.5">
                </div>
                <div class="input-group">
                    <label>終場盤口：</label>
                    <input type="number" id="lineFull" step="0.5" placeholder="例如: 220.5">
                </div>
            </div>

            <button id="predictBtn">🚀 開始預測</button>
        </div>

<div id="result" class="result-card" style="display: none;">
    <div class="result-header">LIVE PREDICTION</div>
    
    <div class="score-summary-box">
        <div class="result-grid">
            <div class="res-item">
                <span class="res-label">預測最終比分</span>
                <span id="finalScore" class="res-value">-- : --</span>
            </div>
            <div class="res-item">
                <span class="res-label">主隊預估勝率</span>
                <span id="winRate" class="res-value">--%</span>
            </div>
        </div>

        <div class="total-status-bar">
            <span class="tag-label current">目前總分：<b id="currentTotal">0</b></span>
            <span class="tag-label projected">預估總分：<b id="projectedTotal">0</b></span>
        </div>
    </div>

    <div id="halfProbContainer" class="probability-container" style="display:none;">
        <div class="prob-header">
            <span>中場大分機率 (預測總分: <b id="halfProjTotal">0</b>)</span>
            <span id="halfProbPercent" class="prob-num">0%</span>
        </div>
        <div class="prob-bar-bg"><div id="halfProbBar" class="prob-bar-fill orange"></div></div>
    </div>

    <div class="probability-container">
        <div class="prob-header">
            <span>終場大分機率 (預測總分: <b id="fullProjTotal">0</b>)</span>
            <span id="fullProbPercent" class="prob-num">0%</span>
        </div>
        <div class="prob-bar-bg"><div id="fullProbBar" class="prob-bar-fill blue"></div></div>
    </div>

    <div id="analysis" class="analysis-box"></div>
</div>

            <div id="analysis" class="analysis-box"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
