<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA 即時勝率預測器</title>
    <link rel="icon" href=favicon.ico.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🏀 NBA 即時預測</h1>
            
            <div class="api-section">
                <button id="fetchDataBtn">🔄 自動抓取今日比分</button>
                <p id="apiStatus">尚未同步數據</p>
            </div>

            <hr>

            <div class="input-group">
                <label>主隊目前得分：</label>
                <input type="number" id="homeScore" value="0">
            </div>
            <div class="input-group">
                <label>客隊目前得分：</label>
                <input type="number" id="awayScore" value="0">
            </div>
            <div class="input-group">
                <label>目前節數：</label>
                <select id="quarter">
                    <option value="1">第一節</option>
                    <option value="2">第二節</option>
                    <option value="3">第三節</option>
                    <option value="4">第四節</option>
                </select>
            </div>
            <div class="input-group">
                <label>該節剩餘時間 (分鐘)：</label>
                <input type="number" id="quarterTime" value="12" min="0" max="12">
            </div>

            <button id="predictBtn" class="predict-btn">🚀 開始計算勝率</button>

            <div id="result" style="display: none;">
                <hr>
                <h3>預估終場：<span id="finalScore"></span></h3>
                <p>主隊勝率：<span id="winRate"></span></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
